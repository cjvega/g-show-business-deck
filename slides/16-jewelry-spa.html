<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>16 · 珠宝与美容</title>
<link rel="stylesheet" href="../shared/tokens.css">
<script src="../shared/i18n.js" defer></script>
</head>
<body>
  <main class="slide">
    <div class="mast">
      <div class="brand"><span class="brand-mark">G-Show</span><span class="brand-sub">P1 Scenario</span></div>
      <div class="meta">16</div>
    </div>
    <section class="content two-col">
      <div class="split-images">
        <div class="image-frame"><img src="../images/p1-mobile-stand-jewelry-showroom.webp" alt="Jewelry showroom movable TV"></div>
        <div class="image-frame"><img src="../images/p1-mobile-stand-spa-consult.webp" alt="Spa consultation movable TV"></div>
      </div>
      <div class="scenario-copy">
        <div class="scenario-num">09</div>
        <div class="kicker" data-en="Trust-Based Sales">信任型销售</div>
        <h2 data-en="High-ticket jewelry / beauty SPA consultation">珠宝高客单 / 美容 SPA 咨询</h2>
        <p class="summary" data-en="These scenarios do not sell a single spec. They sell trust, craft, credentials, process and fit, so the display boundary must be clearer.">这类场景卖的不是单一参数，而是信任、工艺、资历、流程和适合度，需要更清晰的展示边界。</p>
        <div class="scenario-points">
          <div class="scenario-point"><strong data-en="Display">展示</strong><span data-en="Craft details, certificates, cases, process, suitable groups and precautions.">工艺细节、证书、案例、流程、适合人群、注意事项。</span></div>
          <div class="scenario-point"><strong data-en="Pain">痛点</strong><span data-en="Value is hard to see with the naked eye, and consultants may explain loosely or overpromise.">价值难被肉眼理解，顾问容易讲散或过度承诺。</span></div>
          <div class="scenario-point"><strong data-en="Boundary">边界</strong><span data-en="People, efficacy, privacy and sensitive content must pass compliance review first.">人员、疗效、隐私和敏感内容必须先做合规审核。</span></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
