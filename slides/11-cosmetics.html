<body>
  <main class="slide">
    <div class="mast">
      <div class="brand"><span class="brand-mark">G-Show</span><span class="brand-sub">P1 Scenario</span></div>
      <div class="meta">11</div>
    </div>
    <section class="content scenario">
      <div class="image-frame"><img src="../images/p1-mobile-stand-cosmetics-retail.webp" alt="Cosmetics retail with movable TV"></div>
      <div class="scenario-copy">
        <div class="scenario-num">04</div>
        <div class="kicker" data-en="Consultative Retail">顾问式零售</div>
        <h2 data-en="Cosmetics / skincare / fragrance retail">化妆品 / 护肤品 / 香水零售</h2>
        <p class="summary" data-en="Store advisors scan product labels, and the TV shows ingredients, usage steps, suitable skin types and set recommendations to build trust.">导购扫产品标签，电视展示成分、使用步骤、适合肤质和套装推荐，帮助客户建立信任。</p>
        <div class="scenario-points">
          <div class="scenario-point"><strong data-en="Display">展示</strong><span data-en="Product images, ingredients, usage steps, skin-type fit and set combinations.">产品图、成分、用法、肤质匹配、套装组合。</span></div>
          <div class="scenario-point"><strong data-en="Pain">痛点</strong><span data-en="Packaging has limited space, advisors explain inconsistently, and efficacy claims are complex.">包装信息有限，导购话术不统一，功效解释复杂。</span></div>
          <div class="scenario-point"><strong data-en="Boundary">边界</strong><span data-en="Avoid medicalized claims and absolute efficacy promises.">避免医疗化和绝对化功效承诺。</span></div>
        </div>
      </div>
    </section>
