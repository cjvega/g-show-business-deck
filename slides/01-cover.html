<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>01 · G-Show</title>
<link rel="stylesheet" href="../shared/tokens.css">
<script src="../shared/i18n.js" defer></script>
</head>
<body>
  <div class="image-frame full">
    <img src="../images/p1-mobile-stand-lighting-showroom.webp" alt="G-Show mobile TV stand in showroom">
  </div>
  <div class="scrim"></div>
  <main class="slide dark">
    <div class="mast">
      <div class="brand"><span class="brand-mark">G-Show</span><span class="brand-sub">Business Scenario Deck</span></div>
      <div class="meta">P1 · B-side scan to TV</div>
    </div>
    <div class="overlay-copy">
      <div class="kicker" data-en="Offline Object-to-Screen Display System">线下对象扫码展示系统</div>
      <h1 data-en="Make every physical object easy to explain on site">让每个实物对象，都能被现场讲清楚</h1>
      <p class="lede" data-en="B-side staff scan an object, and the B-side TV displays images, videos, specs, cases and explanation materials. A fixed screen works for reception areas; a wheeled TV stand can follow the visiting route.">B 端人员扫码，B 端电视展示图片、视频、参数、案例和说明资料。固定大屏适合接待区，可移动电视支架适合跟随参观路线。</p>
      <div class="pill-row">
        <span class="pill" data-en="Scan to identify objects">扫码定位对象</span>
        <span class="pill" data-en="Show extended content on TV">电视展示延展资料</span>
        <span class="pill" data-en="Mobile stand follows the tour">可移动支架跟随讲解</span>
      </div>
    </div>
    <div class="footer-note"><span>G-Show · HTML Presentation</span><span>For business exploration</span></div>
  </main>
</body>
</html>
