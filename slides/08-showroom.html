<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>08 · 展厅样品间</title>
<link rel="stylesheet" href="../shared/tokens.css">
<script src="../shared/i18n.js" defer></script>
</head>
<body>
  <main class="slide">
    <div class="mast">
      <div class="brand"><span class="brand-mark">G-Show</span><span class="brand-sub">P1 Scenario</span></div>
      <div class="meta">08</div>
    </div>
    <section class="content scenario">
      <div class="image-frame"><img src="../images/p1-mobile-stand-lighting-showroom.webp" alt="Lighting showroom with movable TV"></div>
      <div class="scenario-copy">
        <div class="scenario-num">01</div>
        <div class="kicker" data-en="Highest Priority">优先级最高</div>
        <h2 data-en="Lighting / furniture / building material / sanitary ware showrooms">灯具 / 家具 / 建材 / 卫浴展厅</h2>
        <p class="summary" data-en="Sales staff scan beside the sample, move the TV close to the current object, and let customers see the real item and full materials at the same time.">销售在样品旁扫码，移动电视靠近当前讲解对象，客户同时看实物和完整资料。</p>
        <div class="scenario-points">
          <div class="scenario-point"><strong data-en="Display">展示</strong><span data-en="Hero images, scene images, dimensions, materials, installation diagrams and series combinations.">主图、场景图、尺寸、材质、安装图、系列搭配。</span></div>
          <div class="scenario-point"><strong data-en="Pain">痛点</strong><span data-en="The showroom cannot display everything, materials are scattered, and customers struggle to compare models.">展厅摆不全、资料分散、客户难比较型号。</span></div>
          <div class="scenario-point"><strong data-en="Pitch">卖点</strong><span data-en="Make a limited physical showroom feel like a more complete digital sample room.">让有限展厅看起来像更完整的数字样品间。</span></div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
