<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>02 · 产品定义</title>
<link rel="stylesheet" href="../shared/tokens.css">
<script src="../shared/i18n.js" defer></script>
</head>
<body>
  <main class="slide">
    <div class="mast">
      <div class="brand"><span class="brand-mark">G-Show</span><span class="brand-sub">Definition</span></div>
      <div class="meta">02</div>
    </div>
    <section class="content two-col">
      <div class="hero-copy">
        <div class="kicker" data-en="Product Definition">产品定义</div>
        <h1 data-en="Not a menu. Not a casting tool.">不是菜单，也不是投屏工具</h1>
        <p class="lede" data-en="G-Show is a scan-based object display system for offline sales, service, reception and guided explanation scenarios. It connects real products, services, people, spaces or routes to a structured set of displayable digital materials through SKU, barcode, QR code or object ID.">G-Show 是面向线下销售、服务、接待和讲解场景的扫码式对象展示系统。它把现实中的商品、服务、人员、空间或路线，通过 SKU、条码、二维码或编号，连接到一组可展示的数字资料。</p>
      </div>
      <div>
        <div class="number-grid">
          <div class="number-card"><strong>01</strong><span data-en="Code each real-world object and label it on site.">先给真实对象编码，并在线下贴上码。</span></div>
          <div class="number-card"><strong>02</strong><span data-en="B-side staff scan or select the object on a mobile device.">B 端人员用移动设备扫码或选品。</span></div>
          <div class="number-card"><strong>03</strong><span data-en="The TV shows images, videos, specs, cases and explanations.">电视展示图片、视频、参数、案例和说明。</span></div>
          <div class="number-card"><strong>04</strong><span data-en="Customers understand, compare and ask questions around the big screen.">客户围绕大屏内容理解、比较和提问。</span></div>
        </div>
      </div>
    </section>
    <div class="footer-note"><span>Positioning</span><span>Object → Digital Context → Guided Presentation</span></div>
  </main>
</body>
</html>
