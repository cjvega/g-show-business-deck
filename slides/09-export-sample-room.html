<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>09 · 外贸样品间</title>
<link rel="stylesheet" href="../shared/tokens.css">
<script src="../shared/i18n.js" defer></script>
</head>
<body>
  <main class="slide">
    <div class="mast">
      <div class="brand"><span class="brand-mark">G-Show</span><span class="brand-sub">P1 Scenario</span></div>
      <div class="meta">09</div>
    </div>
    <section class="content scenario">
      <div class="image-frame"><img src="../images/p1-showroom-scan-tv.webp" alt="Salesperson scanning product in showroom"></div>
      <div class="scenario-copy">
        <div class="scenario-num">02</div>
        <div class="kicker" data-en="Export Reception">外贸接待</div>
        <h2 data-en="Export sample rooms / factory showrooms">外贸样品间 / 工厂展厅</h2>
        <p class="summary" data-en="Sales staff scan the SKU or sample code, and the TV shows bilingual materials, selling points, packaging and certificates, reducing on-site searching and ad hoc translation.">业务员扫 SKU 或样品码，电视展示中英文资料、卖点、包装和认证，减少现场找图和临时翻译。</p>
        <div class="scenario-points">
          <div class="scenario-point"><strong data-en="Display">展示</strong><span data-en="Multilingual selling points, specs, packaging, certificates and application markets.">多语言卖点、参数、包装、认证、应用市场。</span></div>
          <div class="scenario-point"><strong data-en="Pain">痛点</strong><span data-en="Material versions are messy, new staff cannot explain clearly, and trade show conversations move fast.">资料版本乱，新人讲不清，展会现场节奏快。</span></div>
          <div class="scenario-point"><strong data-en="Pitch">卖点</strong><span data-en="Standardize how sales staff explain products.">把业务员的讲解口径标准化。</span></div>
        </div>
      </div>
    </section>
  </main>
