<!DOCTYPE html>
<html lang="zh-CN">
<head>

<title>18 · 下一步</title>

</head>
<body>
  <main class="slide dark">
    <div class="mast">
      <div class="brand"><span class="brand-mark">G-Show</span><span class="brand-sub">Next Step</span></div>
      <div class="meta">18</div>
    </div>
    <section class="content">
      <div class="kicker" data-en="Pilot Recommendation">试点建议</div>
      <h1 style="max-width: 1360px;" data-en="Validate P1 with one industry, one scene and one TV route first">先用一个行业、一个场景、一个电视路线跑通 P1</h1>
      <p class="lede" style="max-width: 1180px;" data-en="Do not start by building a system for every industry. Pick the best-fit customer, prepare real object materials, and complete one verifiable sales explanation with either a fixed TV or a mobile TV stand.">不要一开始做成所有行业的系统。先选最适合的客户，准备真实对象资料，用固定电视或移动电视支架完成一场可验证的销售讲解。</p>
      <div class="closing-grid">
        <div class="closing-card"><h3 data-en="Pick an industry">选行业</h3><p data-en="Prioritize showrooms, sample rooms, consultative retail and high-value service consultation.">优先展厅、样品间、顾问式零售和高价值服务咨询。</p></div>
        <div class="closing-card"><h3 data-en="Pick objects">选对象</h3><p data-en="Prepare the first 20 to 50 high-value objects instead of uploading everything at once.">第一批整理 20 到 50 个高价值对象，而不是全量上线。</p></div>
        <div class="closing-card"><h3 data-en="Pick the route">选动线</h3><p data-en="Decide whether the TV is fixed, or follows the visiting route on a mobile stand.">确认电视固定展示，还是使用可移动支架跟随参观路线。</p></div>
      </div>
    </section>
    <div class="footer-note"><span>G-Show</span><span>Business exploration deck · HTML source</span></div>
  </main>

</html>
